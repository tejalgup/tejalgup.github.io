ttitle: "Tejal Gupta: Data Blog"
author: "Tejal Gupta"
description: "Pitt Student Graduating 2024 in Econ-Stats with a CS minor interested in everything data" # This will show up in places like twitter, linkedin, etc, if you share your sites url as a post.

# Email / Social media user names used by the minima theme:
