email: "tejalgupta@pitt.edu"
#twitter_username: "twitteruser"
github_username: "tejalgup"
linkedin_username: "tejal-gupta"
#facebook_username: username
#flickr_username: username
instagram_username: "tejal.gup"
#pinterest_username: username
#youtube_username: username
#googleplus_username: +username

#########################################################################################
######### Nothing below needs to be changed (unless you know what you're doing) #########
#########################################################################################
remote_theme: pages-themes/modernist@v0.2.0

#rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-remote-theme # add this line to the plugins list if you already have one
  - jekyll-feed
  - jekyll-sitemap

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other

sass:
  style: compressed
  load_paths:
    - _sass
  sass_dir: sass
  scss_dir: sass
  # Change the line below to use your custom Sass file
  main: sass/main.scss
