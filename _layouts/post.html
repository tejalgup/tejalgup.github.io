---
layout: default
---
{% include head.html %}

<article class="post">
  <header>
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date: "%Y-%m-%d" }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
