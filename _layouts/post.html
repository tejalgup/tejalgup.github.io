<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    {% include head.html %}
  </head>

  <body class="default">
    {% include header.html %}

    <div class="container">
      <div class="row">
        <div class="col-md-3 sidebar">
          <h3>Recent Posts</h3>
          <ul>
            {% for post in site.posts %}
              <li><a href="{{ post.url }}">{{ post.title }}</a></li>
            {% endfor %}
          </ul>
        </div>

        <div class="col-md-9 main-content">
          {{ content }}
        </div>
      </div>
    </div>

    {% include footer.html %}
    {% include scripts.html %}
  </body>
</html>
